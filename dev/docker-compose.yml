services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.3-apache
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: 1
    ports:
      - "8089:80"
    volumes:
      - wordpress_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/health-check-wordpress

  wpcli:
    image: wordpress:cli-php8.3
    # Matches the "wordpress" service's www-data UID (Debian-based image = 33;
    # this Alpine-based cli image defaults to 82), otherwise commands that
    # write to disk (e.g. `wp config set`) fail with a permission error.
    user: "33:33"
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wordpress_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/health-check-wordpress
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  db_data:
  wordpress_data:
